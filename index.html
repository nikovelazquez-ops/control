<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTROL</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      margin: 0;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 80px);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 18px;
      text-decoration: none;
      color: white;
    }

    .vehicular { background: #2563eb; }
    .camiones  { background: #059669; }
    .visitas   { background: #d97706; }
    .personal  { background: #7c3aed; }

    .btn:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>

  <h1>CONTROL</h1>

  <div class="grid">
    <a href="https://script.google.com/macros/s/AKfycbys4M-xlESmFHvyLtFBgHT-4kwgVM-gFyBvN6aCIgplUgj9mYEVZHJ5eV96rMl4Y3CO/exec" class="btn vehicular">VEHICULAR</a>
    <a href="#" class="btn camiones">CAMIONES</a>
    <a href="https://script.google.com/macros/s/AKfycbycM7Ve47XAiYSdXqGuMVx8jsuSWkRkYifdZAjRMsoBAt15DAQfyA-z_iUBgynS_ha6/exec" class="btn visitas">VISITAS</a>
    <a href="#" class="btn personal">PERSONAL</a>
  </div>

</body>
</html>
